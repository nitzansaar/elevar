<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elevar — Menu</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0c0c0c;
      color: #e8e4de;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }

    header {
      text-align: center;
      padding: 72px 24px 48px;
      border-bottom: 1px solid #222;
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      font-weight: 400;
      letter-spacing: 0.25em;
      color: #c9a96e;
    }

    header p {
      margin-top: 12px;
      font-size: 0.75rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: #555;
    }

    #menu {
      max-width: 860px;
      margin: 0 auto;
      padding: 20px 24px 80px;
    }

    .item {
      padding: 26px 0;
      border-bottom: 1px solid #1a1a1a;
    }

    .item:last-child {
      border-bottom: none;
    }

    .item-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 24px;
    }

    .item-left {
      flex: 1;
      min-width: 0;
    }

    .item-photos {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }

    .photo-wrap {
      position: relative;
      flex: 1;
      max-width: 200px;
    }

    .photo-wrap img {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      border-radius: 6px;
      display: block;
      background: #1a1a1a;
    }

    .photo-label {
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #444;
      margin-top: 5px;
      text-align: center;
    }

    .strain-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem;
      font-weight: 400;
      color: #e8e4de;
      line-height: 1.3;
    }

    .item-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
      align-items: center;
    }

    .tag {
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #666;
      border: 1px solid #2a2a2a;
      border-radius: 20px;
      padding: 3px 10px;
    }

    .thca {
      font-size: 0.75rem;
      color: #8aab84;
      letter-spacing: 0.05em;
    }

    .price {
      font-family: 'Playfair Display', serif;
      font-size: 1.35rem;
      color: #c9a96e;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .dots {
      flex: 1;
      border-bottom: 1px dotted #2a2a2a;
      margin: 0 16px;
      min-width: 20px;
      position: relative;
      top: -4px;
    }

    .status {
      text-align: center;
      padding: 100px 20px;
      color: #444;
      font-size: 0.85rem;
      letter-spacing: 0.15em;
    }
  </style>
</head>
<body>
  <header>
    <h1>ELEVAR</h1>
    <p>Premium Flower Selection</p>
  </header>

  <main id="menu">
    <div class="status">Loading...</div>
  </main>

  <script>
    const CSV_URL = "https://docs.google.com/spreadsheets/d/1d7r0PNbs0WiuDo-1E_Tq4RHRldrYussa9hkzaA6rB44/export?format=csv&gid=0";

    function parseCSV(text) {
      const rows = [];
      for (const line of text.trim().split("\n")) {
        const row = [];
        let field = '', inQuotes = false;
        for (let i = 0; i < line.length; i++) {
          const ch = line[i];
          if (ch === '"') { inQuotes = !inQuotes; }
          else if (ch === ',' && !inQuotes) { row.push(field.trim()); field = ''; }
          else { field += ch; }
        }
        row.push(field.trim());
        rows.push(row);
      }
      return rows;
    }

    function driveToImg(url) {
      if (!url) return null;
      const match = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
      if (match) return `https://drive.google.com/thumbnail?id=${match[1]}&sz=w600`;
      const idMatch = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
      if (idMatch) return `https://drive.google.com/thumbnail?id=${idMatch[1]}&sz=w600`;
      return null;
    }

    function formatPrice(n) {
      return Number.isInteger(n)
        ? `$${n.toLocaleString()}`
        : `$${n.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
    }

    async function loadMenu() {
      const res = await fetch(CSV_URL);
      const text = await res.text();
      const rows = parseCSV(text);
      const headers = rows[0].map(h => h.trim());

      const items = rows.slice(1).map(row =>
        Object.fromEntries(headers.map((h, i) => [h, row[i]?.trim() ?? '']))
      );

      const filtered = items
        .filter(item => item["Sale Price"])
        .map(item => ({
          ...item,
          displayPrice: parseFloat(item["Sale Price"].replace(/[^0-9.]/g, '')) + 350
        }))
        .sort((a, b) => a["Strain Name"].localeCompare(b["Strain Name"]));

      render(filtered);
    }

    function render(items) {
      const menu = document.getElementById('menu');
      if (!items.length) {
        menu.innerHTML = '<div class="status">No items available.</div>';
        return;
      }

      menu.innerHTML = items.map(item => {
        const tags = [item["Type of Flower"], item["Type"]].filter(Boolean);
        const photos = [
          { url: driveToImg(item["Photo of Entire Bag"]),   label: "Entire Bag"  },
          { url: driveToImg(item["Photo of Single Nug"]),   label: "Single Nug"  },
          { url: driveToImg(item["Photo of Triple Nug"]),   label: "Triple Nug"  },
        ].filter(p => p.url);

        return `
          <div class="item">
            <div class="item-header">
              <div class="item-left">
                <div class="strain-name">${item["Strain Name"]}</div>
                <div class="item-tags">
                  ${tags.map(t => `<span class="tag">${t}</span>`).join('')}
                  ${item["THCA %"] ? `<span class="thca">THCA ${item["THCA %"]}</span>` : ''}
                </div>
              </div>
              <div class="dots"></div>
              <div class="price">${formatPrice(item.displayPrice)}</div>
            </div>
            ${photos.length ? `
            <div class="item-photos">
              ${photos.map(p => `
                <div class="photo-wrap">
                  <img src="${p.url}" alt="${p.label}" loading="lazy">
                  <div class="photo-label">${p.label}</div>
                </div>
              `).join('')}
            </div>` : ''}
          </div>
        `;
      }).join('');
    }

    loadMenu().catch(() => {
      document.getElementById('menu').innerHTML = '<div class="status">Failed to load menu.</div>';
    });
  </script>
</body>
</html>
