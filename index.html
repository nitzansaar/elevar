<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elevar — Menu</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0c0c0c;
      color: #e8e4de;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }

    header {
      text-align: center;
      padding: 72px 24px 48px;
      border-bottom: 1px solid #222;
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      font-weight: 400;
      letter-spacing: 0.25em;
      color: #c9a96e;
    }

    header img.logo {
      height: 80px;
      width: auto;
      object-fit: contain;
      margin-bottom: 20px;
    }

    header p {
      margin-top: 12px;
      font-size: 0.75rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: #555;
    }

    #menu {
      max-width: 860px;
      margin: 0 auto;
      padding: 20px 24px 80px;
    }

    .item {
      padding: 26px 0;
      border-bottom: 1px solid #1a1a1a;
    }

    .item:last-child {
      border-bottom: none;
    }

    .item-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 24px;
    }

    .item-left {
      flex: 1;
      min-width: 0;
    }

    .item-photos {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }

    .photo-wrap {
      position: relative;
      flex: 1;
      max-width: 200px;
    }

    .photo-wrap img {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      border-radius: 6px;
      display: block;
      background: #1a1a1a;
      cursor: zoom-in;
      transition: opacity 0.15s;
    }

    .photo-wrap img:hover {
      opacity: 0.85;
    }

    .photo-placeholder {
      width: 100%;
      aspect-ratio: 4/3;
      border-radius: 6px;
      background: #111;
      border: 1px solid #1e1e1e;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
      font-size: 1.4rem;
    }

    /* Lightbox */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    #lightbox.open {
      display: flex;
    }

    #lightbox img {
      max-width: 90vw;
      max-height: 88vh;
      object-fit: contain;
      border-radius: 8px;
      box-shadow: 0 0 60px rgba(0,0,0,0.8);
    }

    #lightbox-close {
      position: fixed;
      top: 20px;
      right: 28px;
      font-size: 2rem;
      color: #888;
      cursor: pointer;
      line-height: 1;
      background: none;
      border: none;
      transition: color 0.15s;
    }

    #lightbox-close:hover {
      color: #e8e4de;
    }

    .photo-label {
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #444;
      margin-top: 5px;
      text-align: center;
    }

    .strain-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem;
      font-weight: 400;
      color: #e8e4de;
      line-height: 1.3;
    }

    .item-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
      align-items: center;
    }

    .tag {
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #666;
      border: 1px solid #2a2a2a;
      border-radius: 20px;
      padding: 3px 10px;
    }

    .thca {
      font-size: 0.75rem;
      color: #8aab84;
      letter-spacing: 0.05em;
    }

    .price {
      font-family: 'Playfair Display', serif;
      font-size: 1.35rem;
      color: #c9a96e;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .dots {
      flex: 1;
      border-bottom: 1px dotted #2a2a2a;
      margin: 0 16px;
      min-width: 20px;
      position: relative;
      top: -4px;
    }

    .status {
      text-align: center;
      padding: 100px 20px;
      color: #444;
      font-size: 0.85rem;
      letter-spacing: 0.15em;
    }

    /* ── Controls ── */
    #controls {
      max-width: 860px;
      margin: 0 auto;
      padding: 28px 24px 0;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    #search {
      width: 100%;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 11px 16px;
      color: #e8e4de;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.15s;
    }

    #search::placeholder { color: #444; }
    #search:focus { border-color: #444; }

    #filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .filter-btn {
      font-family: 'Inter', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #666;
      background: none;
      border: 1px solid #2a2a2a;
      border-radius: 20px;
      padding: 5px 14px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }

    .filter-btn:hover {
      color: #e8e4de;
      border-color: #444;
    }

    .filter-btn.active {
      color: #0c0c0c;
      background: #c9a96e;
      border-color: #c9a96e;
    }

    @media (max-width: 600px) {
      #controls { padding: 20px 16px 0; }
    }

    @media (max-width: 600px) {
      header {
        padding: 48px 20px 32px;
      }

      #menu {
        padding: 16px 16px 60px;
      }

      .item {
        padding: 22px 0;
      }

      .strain-name {
        font-size: 1.1rem;
      }

      .price {
        font-size: 1.1rem;
      }

      /* Hide dots, rely on space-between */
      .dots {
        display: none;
      }

      /* Photos scroll horizontally */
      .item-photos {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
        gap: 8px;
        margin-top: 12px;
        padding-bottom: 4px;
      }

      .item-photos::-webkit-scrollbar {
        display: none;
      }

      .photo-wrap {
        flex: 0 0 140px;
        max-width: none;
      }
    }
  </style>
</head>
<body>
  <header>
    <img class="logo" src="logo.png" alt="Elevar">
    <h1>ELEVAR</h1>
    <p>Premium Flower Selection</p>
  </header>

  <div id="controls">
    <input id="search" type="search" placeholder="Search strains…">
    <div id="filters"></div>
  </div>

  <main id="menu">
    <div class="status">Loading...</div>
  </main>

  <div id="lightbox">
    <button id="lightbox-close">&times;</button>
    <img id="lightbox-img" src="" alt="">
  </div>

  <script>
    const CSV_URL = "https://docs.google.com/spreadsheets/d/1d7r0PNbs0WiuDo-1E_Tq4RHRldrYussa9hkzaA6rB44/export?format=csv&gid=0";

    function parseCSV(text) {
      const rows = [];
      for (const line of text.trim().split("\n")) {
        const row = [];
        let field = '', inQuotes = false;
        for (let i = 0; i < line.length; i++) {
          const ch = line[i];
          if (ch === '"') { inQuotes = !inQuotes; }
          else if (ch === ',' && !inQuotes) { row.push(field.trim()); field = ''; }
          else { field += ch; }
        }
        row.push(field.trim());
        rows.push(row);
      }
      return rows;
    }

    function driveToImg(url) {
      if (!url) return null;
      const match = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
      if (match) return `https://drive.google.com/thumbnail?id=${match[1]}&sz=w600`;
      const idMatch = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
      if (idMatch) return `https://drive.google.com/thumbnail?id=${idMatch[1]}&sz=w600`;
      return null;
    }

    function formatPrice(n) {
      return Number.isInteger(n)
        ? `$${n.toLocaleString()}`
        : `$${n.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
    }

    let allItems = [];
    let activeFilter = 'All';

    async function loadMenu() {
      const res = await fetch(CSV_URL);
      const text = await res.text();
      const rows = parseCSV(text);
      const headers = rows[0].map(h => h.trim());

      const items = rows.slice(1).map(row =>
        Object.fromEntries(headers.map((h, i) => [h, row[i]?.trim() ?? '']))
      );

      allItems = items
        .filter(item => item["Sale Price"])
        .map(item => ({
          ...item,
          displayPrice: parseFloat(item["Sale Price"].replace(/[^0-9.]/g, '')) + 350
        }))
        .sort((a, b) => a["Strain Name"].localeCompare(b["Strain Name"]));

      buildFilters();
      applyFilters();
    }

    function buildFilters() {
      const types = ['All', ...new Set(allItems.map(i => i["Type of Flower"]).filter(Boolean).sort())];
      document.getElementById('filters').innerHTML = types.map(t => `
        <button class="filter-btn ${t === 'All' ? 'active' : ''}" data-type="${t}">${t}</button>
      `).join('');

      document.getElementById('filters').addEventListener('click', e => {
        const btn = e.target.closest('.filter-btn');
        if (!btn) return;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeFilter = btn.dataset.type;
        applyFilters();
      });
    }

    function normalize(str) {
      return str.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();
    }

    function applyFilters() {
      const query = normalize(document.getElementById('search').value.trim());
      const results = allItems.filter(item => {
        const matchType = activeFilter === 'All' || item["Type of Flower"] === activeFilter;
        const matchSearch = !query || normalize(item["Strain Name"]).includes(query);
        return matchType && matchSearch;
      });
      render(results);
    }

    function render(items) {
      const menu = document.getElementById('menu');
      if (!items.length) {
        menu.innerHTML = '<div class="status">No results found.</div>';
        return;
      }

      menu.innerHTML = items.map(item => {
        const tags = [item["Type of Flower"], item["Type"]].filter(Boolean);
        const photos = [
          { url: driveToImg(item["Photo of Entire Bag"]),   label: "Entire Bag"  },
          { url: driveToImg(item["Photo of Single Nug"]),   label: "Single Nug"  },
          { url: driveToImg(item["Photo of Triple Nug"]),   label: "Triple Nug"  },
        ].filter(p => p.url);

        return `
          <div class="item">
            <div class="item-header">
              <div class="item-left">
                <div class="strain-name">${item["Strain Name"]}</div>
                <div class="item-tags">
                  ${tags.map(t => `<span class="tag">${t}</span>`).join('')}
                  ${item["THCA %"] ? `<span class="thca">THCA ${item["THCA %"]}</span>` : ''}
                </div>
              </div>
              <div class="dots"></div>
              <div class="price">${formatPrice(item.displayPrice)}</div>
            </div>
            ${photos.length ? `
            <div class="item-photos">
              ${photos.map(p => `
                <div class="photo-wrap">
                  <img src="${p.url}" alt="${p.label}" loading="lazy" onclick="openLightbox(this.src)" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'photo-placeholder',textContent:'✕'}))">
                  <div class="photo-label">${p.label}</div>
                </div>
              `).join('')}
            </div>` : ''}
          </div>
        `;
      }).join('');
    }

    const lightbox    = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');

    function openLightbox(src) {
      lightboxImg.src = src.replace('sz=w600', 'sz=w1600');
      lightbox.classList.add('open');
    }

    function closeLightbox() {
      lightbox.classList.remove('open');
      lightboxImg.src = '';
    }

    document.getElementById('search').addEventListener('input', applyFilters);
    document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
    lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

    loadMenu().catch(() => {
      document.getElementById('menu').innerHTML = '<div class="status">Failed to load menu.</div>';
    });
  </script>
</body>
</html>
